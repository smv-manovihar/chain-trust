services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - chain-trust-network

  frontend:
    build: ./frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_RPC_URL=http://localhost:7545
      - NEXT_PUBLIC_IS_LOCAL=true
    networks:
      - chain-trust-network

  backend:
    build: ./backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost
      - MONGODB_URI=mongodb://mongodb:27017/chaintrust
      - JWT_SECRET=dev_secret_key
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=chaintrust
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000/chaintrust
    depends_on:
      - mongodb
      - minio
    networks:
      - chain-trust-network

  ai-service:
    build: ./ai-service
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/chaintrust
      - JWT_SECRET=dev_secret_key
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - mongodb
    networks:
      - chain-trust-network

  # Local Infrastructure
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ./infra-data/mongodb:/data/db
    networks:
      - chain-trust-network

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./infra-data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - chain-trust-network

  ganache:
    image: trufflesuite/ganache-cli:latest
    ports:
      - "7545:8545"
    command: ["--mnemonic", "sugar point draft zero educate verify dose early logic exact type track", "--port", "8545", "--host", "0.0.0.0"]
    networks:
      - chain-trust-network

networks:
  chain-trust-network:
    driver: bridge
